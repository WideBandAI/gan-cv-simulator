name: Release

permissions:
  contents: write
  id-token: write
  attestations: write

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:

      - uses: actions/checkout@v4

      - name: Extract crate name
        shell: bash
        run: |
          echo "PROJECT_NAME=$(grep '^name' Cargo.toml | head -n1 | cut -d '"' -f2)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y musl-tools libfontconfig1-dev

      - name: Install cross
        if: runner.os == 'Linux'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Set extension
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "EXT=.exe" >> $GITHUB_ENV
          else
            echo "EXT=" >> $GITHUB_ENV
          fi

      - name: Package
        shell: bash
        run: |

          BIN=target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}${EXT}
          DIR=${{ env.PROJECT_NAME }}-${{ github.ref_name }}-${{ matrix.target }}

          mkdir $DIR
          cp $BIN $DIR/

          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar czf $DIR.tar.gz $DIR
            echo "ASSET=$DIR.tar.gz" >> $GITHUB_ENV
          else
            zip -r $DIR.zip $DIR
            echo "ASSET=$DIR.zip" >> $GITHUB_ENV
          fi

      - name: Checksum
        run: |
          sha256sum $ASSET > $ASSET.sha256
          echo "CHECKSUM=$ASSET.sha256" >> $GITHUB_ENV

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}

  package-linux:

    runs-on: ubuntu-latest
    needs: build

    steps:

      - uses: actions/checkout@v4

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Install cargo-rpm
        run: cargo install cargo-rpm

      - name: Build deb
        run: cargo deb

      - name: Build rpm
        run: cargo rpm build

      - name: Upload packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/release/rpmbuild/RPMS/*/*.rpm

  dist:

    runs-on: ubuntu-latest
    needs: build

    steps:

      - uses: actions/checkout@v4

      - name: Install cargo-dist
        run: cargo install cargo-dist

      - name: Generate installers
        run: cargo dist build